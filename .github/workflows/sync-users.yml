name: Sync Active Users

on:
  schedule:
    # Every 15 minutes — keeps all active users' PR data fresh
    - cron: '*/15 * * * *'
  workflow_dispatch: # Manual trigger from GitHub UI for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fetch active users
        id: fetch_users
        run: |
          echo "Fetching list of active users..."
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://gssoc-tracker.vercel.app/api/cron/sync-users" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $RESPONSE"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "Failed to fetch users (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Sync users sequentially
        run: |
          # Read the users array using jq (pre-installed on ubuntu-latest)
          USERS=$(cat /tmp/response.json | jq -r '.users[]')
          
          TOTAL=$(cat /tmp/response.json | jq '.users | length')
          echo "Found $TOTAL users to sync."
          
          if [ "$TOTAL" -eq "0" ]; then
            echo "No active users to sync."
            exit 0
          fi

          SUCCESS=0
          FAILED=0

          for USER in $USERS; do
            echo "Syncing $USER..."
            RES=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://gssoc-tracker.vercel.app/api/cron/sync-single-user" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              -d "{\"user\": \"$USER\"}")
            
            if [ "$RES" = "200" ]; then
              echo "✓ $USER synced"
              SUCCESS=$((SUCCESS+1))
            else
              echo "✗ Failed to sync $USER (HTTP $RES)"
              FAILED=$((FAILED+1))
            fi
            
            # Pace requests to avoid GitHub API rate limits (30 req/min limit)
            sleep 2
          done
          
          echo "✅ Finished. $SUCCESS succeeded, $FAILED failed."
